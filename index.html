<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Player Intel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav id="sidebar">
        <input type="text" id="player-search" placeholder="Search players..." />
        <p>Positions</p>
        <ul>
            <li>QB</li>
            <li>RB</li>
            <li>TE</li>
            <li>WR</li>
        </ul>
    </nav>

    <main id="dashboard">
        <header id="player-header">
            <h1>Player Name</h1>
            <p>Team</p>
            <p>Position</p>
        </header>

        <section id="prop-card">
            <h2>Prop Projection</h2>
            <p>Placeholder Stat</p>
        </section>

        <section id="valuation-card">
            <h2>Roster Valuation</h2>
            <p>Placeholder Stat</p>
        </section>

        <section id="scouting-report">
            <h2>Scouting Report</h2>
            <p>Here is the explanation for the scouting report</p>
        </section>
    </main>
</body>
</html>
